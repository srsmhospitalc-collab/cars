<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinX - Earn & Redeem</title>
<link rel="stylesheet" href="style.css">
<script src='//libtl.com/sdk.js' data-zone='11310206' data-sdk='show_11310206'></script>
</head>
<body>
<div class="bg-blob"></div>
<div class="bg-blob2"></div>

<div class="container">
  <div class="logo">💎 CoinX</div>
  <div class="card">
    <p class="label">Your Balance</p>
    <h1 id="coins">0</h1>
    <p class="sub" id="limitText">Today: 0/10</p>
  </div>

  <button id="playBtn" class="btn btn-primary">
    <span>▶️ Watch Ad & Earn 5 Coins</span>
  </button>
  
  <button id="redeemBtn" class="btn btn-danger" disabled>
    <span>🎁 Redeem 100 Coins</span>
  </button>
  
  <p id="timer" class="timer"></p>
</div>

<!-- Question Modal -->
<div id="qModal" class="modal">
  <div class="modal-box">
    <h2 id="qCount">Question 1/3</h2>
    <h1 id="question">2 + 2 = ?</h1>
    <input type="number" id="answer" placeholder="Answer here">
    <button id="submitAns" class="btn btn-primary">Submit</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
