<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Master Game</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src='//libtl.com/sdk.js' data-zone='11310206' data-sdk='show_11310206'></script>

<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="header">
    <div>👤 <span id="username">User</span></div>
    <div class="coins">🪙 <span id="coins">0</span></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('game')">🎮 Game</button>
    <button class="tab" onclick="showTab('redeem')">💰 Redeem</button>
  </div>

  <div id="gameTab">
    <p id="limitText">Today: 0/30 Levels</p>
    <div id="levels"></div>
  </div>

  <div id="redeemTab" style="display:none">
    <div class="level-box">
      <h2>🎁 Redeem Coins</h2>
      <p>Min: 1000 Coins | Gap: 2 Din</p>
      <p class="warning">⚠️ Dhyan: Galat Link/UPI dala to coin wapas nahi milenge</p>
      <input type="text" id="redeemLink" placeholder="Instagram Reel Link ya UPI ID">
      <button id="confirmRedeem" class="btn btn-play">Submit Request</button>
      <p id="redeemError"></p>
    </div>
  </div>
</div>

<!-- Question Modal -->
<div class="modal" id="qModal">
  <div class="modal-box">
    <h2 id="qCount">Question 1/10</h2>
    <h3 id="question"></h3>
    <input type="number" id="answer" placeholder="Jawab likho">
    <button id="submitAns" class="btn btn-play">Submit</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
