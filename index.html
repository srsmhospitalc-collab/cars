<!DOCTYPE html>
<html>
<head>
<title>Coin App</title>
<script src='//libtl.com/sdk.js' data-zone='11310206' data-sdk='show_11310206'></script>
<style>
body{text-align:center;background:#111;color:#fff;font-family:sans-serif}
#coins{font-size:50px;color:gold}
button{padding:15px 30px;font-size:18px;border:none;border-radius:10px;margin:10px;cursor:pointer}
#playBtn{background:#00ff00}
#redeemBtn{background:#ff0000;color:#fff}
#redeemBtn:disabled{background:gray}
</style>
</head>
<body>

<h1>💰 Coins: <span id="coins">0</span></h1>
<button id="playBtn">Watch Ad +5 Coins</button>
<button id="redeemBtn" disabled>Redeem 100 Coins</button>

<script>
let coins = parseInt(localStorage.getItem("coins")) || 0;
updateUI();

function updateUI(){
  document.getElementById("coins").innerText = coins;
  document.getElementById("redeemBtn").disabled = coins < 100;
}

// AD + COIN
document.getElementById("playBtn").onclick = () => {
  playBtn.disabled = true;
  show_11310206().then(() => {
    coins += 5;
    localStorage.setItem("coins", coins);
    updateUI();
    alert("+5 Coins mil gaye!");
    playBtn.disabled = false;
  }).catch(()=> {
    alert("Ad pura dekho");
    playBtn.disabled = false;
  });
}

// GOOGLE SHEET ME BHEJO
document.getElementById("redeemBtn").onclick = () => {
  let link = prompt("Insta Reel Link ya UPI ID dalo:");
  if(link){
    let data = {
      link: link,
      coins: 100,
      username: "user_" + Date.now()
    };

    fetch("https://script.google.com/macros/s/AKfycbw33O3Y3xqtM9L9RoISjEMj15pAF6FT9Y4kcfNMk5ig3LDZt08Rqr2_4SA2hURy-xbQ/exec", {
      method: "POST",
      body: JSON.stringify(data)
    });

    coins -= 100;
    localStorage.setItem("coins", coins);
    updateUI();
    alert("Request bhej di gayi ✅ Sheet check kar");
  }
}
</script>
</body>
</html>
